name: Render conversation pages

on:
  push:
    branches:
      - main
    paths:
      - 'reproduce/**/*.py'
      - 'tools/render_conversation_pages.py'
      - '.github/workflows/render-conversation-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Render conversation pages
        run: python tools/render_conversation_pages.py

      - name: Commit generated pages if changed
        run: |
          if [ -n "$(git status --porcelain conversation)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add conversation/
            git commit -m "Regenerate conversation pages"
            git push
          else
            echo "No generated conversation page changes."
          fi
